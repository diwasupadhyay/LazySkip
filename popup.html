<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #15151b;
    --text: #f3f3f6;
    --muted: #8c8c98;
    --line: #2a2a34;
    --netflix: #e50914;
    --prime: #00a8e1;
    --extra: #21c46b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; width: 252px;
    font: 13px/1.35 system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    display: flex; align-items: baseline; gap: 7px;
    padding: 13px 16px 11px; border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: .3px; }
  header .ver { margin-left: auto; font-size: 10px; color: var(--muted); }

  .section { padding: 11px 16px 9px; border-bottom: 1px solid var(--line); }
  .group {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: .8px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 3px;
  }
  .group::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
  }
  .netflix { --accent: var(--netflix); }
  .prime   { --accent: var(--prime); }
  .extra   { --accent: var(--extra); }

  .row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 7px 0; cursor: pointer; user-select: none;
  }

  /* toggle switch — the whole .row is a <label>, so anywhere toggles it */
  .sw { position: relative; width: 34px; height: 20px; flex: none; }
  .sw input { position: absolute; opacity: 0; margin: 0; width: 100%; height: 100%; cursor: pointer; }
  .sw .slider {
    position: absolute; inset: 0; pointer-events: none;
    background: var(--line); border-radius: 999px; transition: background .18s;
  }
  .sw .slider::before {
    content: ""; position: absolute; height: 14px; width: 14px;
    left: 3px; top: 3px; background: #fff; border-radius: 50%;
    transition: transform .18s;
  }
  .sw input:checked + .slider { background: var(--accent); }
  .sw input:checked + .slider::before { transform: translateX(14px); }

  .speed { display: flex; align-items: center; gap: 10px; padding: 9px 0 4px; }
  .speed span:first-child { color: var(--muted); }
  .speed input[type="range"] { flex: 1; accent-color: var(--accent); }
  .speed .val {
    min-width: 30px; text-align: right; font-weight: 700;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }

  footer { text-align: center; padding: 11px 16px 13px; font-size: 11px; color: var(--muted); }
  footer b { color: var(--text); font-weight: 600; }
</style>
</head>
<body>
  <header>
    <h1>LazySkip</h1>
    <span class="ver">v1</span>
  </header>

  <div class="section netflix">
    <div class="group">Netflix</div>
    <label class="row"><span>Skip intro</span>
      <span class="sw"><input type="checkbox" id="nfIntro"><span class="slider"></span></span></label>
    <label class="row"><span>Skip recap</span>
      <span class="sw"><input type="checkbox" id="nfRecap"><span class="slider"></span></span></label>
    <label class="row"><span>Auto next episode</span>
      <span class="sw"><input type="checkbox" id="nfNext"><span class="slider"></span></span></label>
  </div>

  <div class="section prime">
    <div class="group">Prime Video</div>
    <label class="row"><span>Skip intro</span>
      <span class="sw"><input type="checkbox" id="pvIntro"><span class="slider"></span></span></label>
    <label class="row"><span>Skip recap</span>
      <span class="sw"><input type="checkbox" id="pvRecap"><span class="slider"></span></span></label>
    <label class="row"><span>Auto next episode</span>
      <span class="sw"><input type="checkbox" id="pvNext"><span class="slider"></span></span></label>
  </div>

  <div class="section extra">
    <div class="group">Ads &amp; Extras</div>
    <label class="row"><span>Speed up ads</span>
      <span class="sw"><input type="checkbox" id="speedAds"><span class="slider"></span></span></label>
    <div class="speed">
      <span>Ad speed</span>
      <input type="range" id="adSpeed" min="2" max="16" step="1">
      <span class="val" id="adSpeedVal">8×</span>
    </div>
    <label class="row"><span>On-screen toast</span>
      <span class="sw"><input type="checkbox" id="showToast"><span class="slider"></span></span></label>
  </div>

  <footer>built with <b>laziness</b></footer>

  <script src="popup.js"></script>
</body>
</html>
