<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #131319; --card: #1c1c26; --text: #f4f4f7; --muted: #8b8b99;
    --line: #2a2a36; --hover: rgba(255,255,255,.05);
    --netflix: #e50914; --prime: #00a8e1; --accent: #25c281;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; width: 286px;
    font: 13px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  header { display: flex; align-items: center; padding: 15px 18px 13px; }
  .brand { font-size: 17px; font-weight: 800; letter-spacing: -.2px; }
  .brand .k { color: var(--accent); }
  .ver { margin-left: auto; font-size: 10px; font-weight: 600; color: var(--muted);
         border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; }

  /* segmented service picker */
  .tabs { display: flex; gap: 8px; padding: 0 18px; }
  .tab {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 0; font: inherit; font-size: 13px; font-weight: 600; color: var(--muted);
    background: var(--card); border: 1px solid var(--line); border-radius: 11px;
    cursor: pointer; transition: transform .12s, color .15s, border-color .15s, background .15s;
  }
  .tab:hover { color: var(--text); }
  .tab:active { transform: scale(.97); }
  .tab svg { display: block; border-radius: 5px; }
  .tab[aria-selected="true"] { color: #fff; border-color: transparent; }
  .tab[data-tab="nf"][aria-selected="true"] { background: var(--netflix); }
  .tab[data-tab="pv"][aria-selected="true"] { background: var(--prime); }

  .hint { text-align: center; color: var(--muted); font-size: 12px; padding: 22px 18px 18px; }
  .hint[hidden] { display: none; }

  .panel { padding: 10px 18px 4px; }
  .panel[hidden] { display: none; }
  .panel.netflix { --sw: var(--netflix); }
  .panel.prime   { --sw: var(--prime); }
  .shared { --sw: var(--accent); }

  .group {
    margin: 12px 18px 0; padding: 6px; background: var(--card);
    border: 1px solid var(--line); border-radius: 13px;
  }
  .glabel {
    font-size: 10px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
    color: var(--muted); padding: 7px 10px 4px;
  }

  .row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 9px 10px; border-radius: 9px; cursor: pointer; user-select: none;
    transition: background .12s;
  }
  .row:hover { background: var(--hover); }

  .speed { display: flex; align-items: center; gap: 11px; padding: 6px 10px 9px; }
  .speed .cap { color: var(--muted); }
  .speed input[type="range"] { flex: 1; accent-color: var(--accent); }
  .speed .val { min-width: 32px; text-align: right; font-weight: 700; color: var(--accent);
                font-variant-numeric: tabular-nums; }
  .row.sub span { font-size: 12px; color: var(--muted); }

  /* toggle switch */
  .sw { position: relative; width: 36px; height: 21px; flex: none; }
  .sw input { position: absolute; opacity: 0; margin: 0; width: 100%; height: 100%; cursor: pointer; }
  .sw .slider { position: absolute; inset: 0; pointer-events: none; background: #3a3a48;
                border-radius: 999px; transition: background .18s; }
  .sw .slider::before { content: ""; position: absolute; height: 15px; width: 15px; left: 3px; top: 3px;
                        background: #fff; border-radius: 50%; transition: transform .18s; }
  .sw input:checked + .slider { background: var(--sw); }
  .sw input:checked + .slider::before { transform: translateX(15px); }

  /* stats */
  .stats { display: flex; margin: 16px 18px 4px; background: var(--card);
           border: 1px solid var(--line); border-radius: 13px; overflow: hidden; }
  .stat { flex: 1; text-align: center; padding: 13px 6px; }
  .stat + .stat { border-left: 1px solid var(--line); }
  .stat .num { font-size: 25px; font-weight: 800; letter-spacing: -.5px; line-height: 1;
               font-variant-numeric: tabular-nums; }
  .stat .lbl { font-size: 10px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase;
               color: var(--muted); margin-top: 6px; }

  footer { padding: 12px 18px 15px; }
  .footrow { display: flex; align-items: center; justify-content: space-between; }
  .repo { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted);
          text-decoration: none; padding: 5px 11px; border: 1px solid var(--line); border-radius: 999px;
          transition: color .15s, border-color .15s; }
  .repo:hover { color: var(--text); border-color: var(--muted); }
  .repo svg { fill: currentColor; }
  .reset { font: inherit; font-size: 11px; color: var(--muted); background: none; border: 0;
           cursor: pointer; padding: 5px 6px; transition: color .15s; }
  .reset:hover { color: var(--text); }
  .made { text-align: center; margin-top: 11px; font-size: 11px; color: var(--muted); }
  .made b { color: var(--text); font-weight: 600; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
  <header>
    <span class="brand">Lazy<span class="k">Skip</span></span>
    <span class="ver">v1.1</span>
  </header>

  <div class="tabs">
    <button class="tab" data-tab="nf" aria-selected="false">
      <svg width="16" height="16" viewBox="0 0 24 24"><rect width="24" height="24" rx="6" fill="#e50914"/><path d="M9 7l9 5-9 5z" fill="#fff"/></svg>
      Netflix
    </button>
    <button class="tab" data-tab="pv" aria-selected="false">
      <svg width="16" height="16" viewBox="0 0 24 24"><rect width="24" height="24" rx="6" fill="#00a8e1"/><path d="M9 7l9 5-9 5z" fill="#fff"/></svg>
      Prime
    </button>
  </div>

  <div class="hint" id="hint">Choose a service to set up auto-skip</div>

  <div class="panel netflix" id="panel-nf" hidden>
    <div class="group">
      <label class="row"><span>Skip intro</span>
        <span class="sw"><input type="checkbox" id="nfIntro"><span class="slider"></span></span></label>
      <label class="row"><span>Skip recap</span>
        <span class="sw"><input type="checkbox" id="nfRecap"><span class="slider"></span></span></label>
      <label class="row"><span>Auto-play next episode</span>
        <span class="sw"><input type="checkbox" id="nfNext"><span class="slider"></span></span></label>
    </div>
  </div>

  <div class="panel prime" id="panel-pv" hidden>
    <div class="group">
      <label class="row"><span>Skip intro</span>
        <span class="sw"><input type="checkbox" id="pvIntro"><span class="slider"></span></span></label>
      <label class="row"><span>Skip recap</span>
        <span class="sw"><input type="checkbox" id="pvRecap"><span class="slider"></span></span></label>
      <label class="row"><span>Auto-play next episode</span>
        <span class="sw"><input type="checkbox" id="pvNext"><span class="slider"></span></span></label>
    </div>
  </div>

  <div class="shared">
    <div class="group">
      <div class="glabel">Ads &amp; extras</div>
      <label class="row"><span>Skip &amp; speed up ads</span>
        <span class="sw"><input type="checkbox" id="speedAds"><span class="slider"></span></span></label>
      <div class="speed">
        <span class="cap">Ad speed</span>
        <input type="range" id="adSpeed" min="2" max="16" step="1">
        <span class="val" id="adSpeedVal">8×</span>
      </div>
      <label class="row sub"><span>On-screen toast</span>
        <span class="sw"><input type="checkbox" id="showToast"><span class="slider"></span></span></label>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="statSkips">0</div><div class="lbl">intros &amp; recaps</div></div>
    <div class="stat"><div class="num" id="statAds">0</div><div class="lbl">ads handled</div></div>
  </div>

  <footer>
    <div class="footrow">
      <a class="repo" href="https://github.com/diwasupadhyay/LazySkip" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
        GitHub
      </a>
      <button class="reset" id="reset">Reset stats</button>
    </div>
    <div class="made">built with <b>laziness</b></div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
